<!DOCTYPE html>
<html>
<head>
  <title>prjcts</title>
</head>
<body>
  <h1>prjcts</h1>
  <div id="projects"></div>
  <script>
    fetch('https://api.github.com/users/alexpriest/repos?type=public')
      .then(r => r.json())
      .then(repos => {
        const container = document.getElementById('projects');
        const skip = ['alexpriest.github.io', 'homebrew-tap'];
        repos
          .filter(r => !r.archived && !r.fork && !skip.includes(r.name))
          .sort((a, b) => new Date(b.pushed_at) - new Date(a.pushed_at))
          .forEach(r => {
            const a = document.createElement('a');
            a.href = r.homepage || (r.has_pages ? `/${r.name}` : r.html_url);
            a.textContent = r.name.replace(/-/g, ' ');
            container.appendChild(a);
            if (r.description) {
              container.appendChild(document.createTextNode(` — ${r.description}`));
            }
            container.appendChild(document.createElement('br'));
          });
      });
  </script>
</body>
</html>
